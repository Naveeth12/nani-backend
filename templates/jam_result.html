<!DOCTYPE html>
<html>
<head>
<title>JAM Result</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#0f2027;
color:white;
font-family:Segoe UI;
text-align:center;
}

.container{
padding:40px;
}

canvas{
max-width:400px;
margin:auto;
}

.score{
font-size:40px;
margin:20px;
color:#00f2fe;
}

.result{
font-size:24px;
margin-top:20px;
}

.pass{
color:#00ff9c;
}

.fail{
color:#ff4d4d;
}

button{
margin-top:30px;
padding:12px 30px;
border:none;
border-radius:25px;
background:#4facfe;
color:white;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>JAM Round Result</h1>

<div class="score">{{score}}%</div>

<canvas id="chart"></canvas>

<div class="result">
{% if qualified %}
<span class="pass">✅ Qualified for HR Round</span>
{% else %}
<span class="fail">❌ Not Qualified</span>
{% endif %}
</div>

{% if qualified %}
<form action="/level5">
<button>Go to HR Round</button>
</form>
{% endif %}

</div>

<script>

const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'pie',
    data: {
        labels: ['Confidence', 'Improvement'],
        datasets: [{
            data: [{{confidence}}, {{improvement}}]
        }]
    }
});

</script>

</body>
</html>
