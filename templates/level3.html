<!DOCTYPE html>
<html>

<head>

<title>Level 3 - Coding Round</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
color:white;
overflow-x:hidden;

}

.container{

max-width:1000px;
margin:auto;
padding:40px;

}

h1{

text-align:center;
margin-bottom:30px;
font-size:40px;
letter-spacing:2px;

}

/* Progress bar */

.progress-container{

width:100%;
background:#1c1c1c;
border-radius:20px;
margin-bottom:40px;

}

.progress-bar{

height:12px;
width:0%;
background:linear-gradient(90deg,#00f2fe,#4facfe);
border-radius:20px;
transition:0.4s;

}

/* Question card */

.card{

background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:25px;
margin-bottom:30px;
border-radius:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);

transform:translateY(50px);
opacity:0;

animation:fadeUp 1s forwards;

transition:0.4s;

}

.card:hover{

transform:rotateX(5deg) rotateY(5deg) scale(1.02);

box-shadow:0 20px 60px rgba(0,255,255,0.4);

}

/* Question text */

.card h3{

margin-bottom:10px;
color:#00f2fe;

}

/* Coding textarea */

textarea{

width:100%;
height:150px;
margin-top:15px;
padding:15px;

background:#0d1117;
color:#00ff9c;

border:none;
border-radius:10px;

font-family:Consolas;
font-size:14px;

outline:none;

box-shadow:inset 0 0 10px #000;

}

/* Submit button */

button{

display:block;
margin:auto;
margin-top:20px;

padding:14px 40px;

font-size:18px;

border:none;
border-radius:30px;

background:linear-gradient(45deg,#00f2fe,#4facfe);

color:white;

cursor:pointer;

box-shadow:0 0 15px #00f2fe;

transition:0.4s;

}

button:hover{

transform:scale(1.1);

box-shadow:0 0 30px #00f2fe;

}

/* animation */

@keyframes fadeUp{

to{

transform:translateY(0);
opacity:1;

}

}

</style>

</head>

<body>

<div class="container">

<h1>Level 3 - Coding Round</h1>

<div class="progress-container">
<div class="progress-bar" id="progress"></div>
</div>

<!-- ✅ ONLY FIX: added action + method -->
<form id="form" action="/submit_level3" method="post">

{% for q in questions[:3] %}

<div class="card">

<h3>Question {{loop.index}}</h3>

<p>{{q.question}}</p>

<textarea name="{{loop.index0}}" placeholder="Write your Python solution here..."></textarea>

</div>

{% endfor %}

<button type="submit">Submit Code</button>

</form>

</div>

<script>

/* Progress Bar */

const textareas = document.querySelectorAll("textarea")
const progress = document.getElementById("progress")

textareas.forEach(area => {

area.addEventListener("input",updateProgress)

})

function updateProgress(){

let filled=0

textareas.forEach(a=>{

if(a.value.trim().length>0){

filled++

}

})

let percent=(filled/textareas.length)*100

progress.style.width=percent+"%"

}

</script>

<!-- ================= CAMERA + ANTI CHEATING ================= -->

<video id="camera"
autoplay
muted
style="position:fixed;bottom:10px;right:10px;width:200px;border:3px solid red;border-radius:10px">
</video>

<script src="/static/proctor.js"></script>

<script>

async function continueCamera(){

if(localStorage.getItem("cameraAllowed")!=="true"){

alert("Camera permission missing. Interview cancelled.");

window.location="/";

return;

}

try{

const stream = await navigator.mediaDevices.getUserMedia({video:true});

const video=document.getElementById("camera");

video.srcObject=stream;

}
catch(err){

alert("Camera access lost. Interview cancelled.");

window.location="/";

}

}

continueCamera();

</script>

</body>

</html>
