<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Interview System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#001a40,#0047ab,#00aaff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.main-container{
width:90%;
height:90%;
display:flex;
align-items:center;
justify-content:space-between;
}

.form-section{
width:50%;
padding:40px;
background:rgba(255,255,255,0.08);
border-radius:25px;
box-shadow:0 0 40px rgba(0,0,0,0.6),
inset 0 0 20px rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
}

h1{
color:white;
margin-bottom:20px;
font-size:32px;
}

input,select{
width:100%;
padding:15px;
margin:15px 0;
border:none;
border-radius:12px;
font-size:16px;
background:rgba(255,255,255,0.9);
}

button{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#007bff,#00d4ff);
color:white;
cursor:pointer;
}

.robot-section{
width:45%;
height:100%;
}

#robotCanvas{
width:100%;
height:100%;
}

</style>
</head>
<body>

<div class="main-container">

<div class="form-section">

<h1>AI Interview Assistant</h1>

<form action="/start_interview" method="post">

<input type="text" name="name" placeholder="Enter your name" required>

<input type="email" name="email" placeholder="Enter your email" required>

<select name="company">
<option value="normal">Normal Company</option>
<option value="mnc">MNC Company</option>
</select>

<select name="branch" required>
<option value="">Select Branch</option>
<option value="CSE">CSE</option>
<option value="ECE">ECE</option>
<option value="EEE">EEE</option>
<option value="MECH">MECH</option>
<option value="CIVIL">CIVIL</option>
</select>

<select name="domain" required>
<option value="">Select Domain</option>
<option value="python">Python</option>
<option value="data science">Data Science</option>
<option value="java">Java</option>
</select>

<button type="submit">Start Interview</button>

</form>

</div>

<div class="robot-section">
<div id="robotCanvas"></div>
</div>

</div>

<script>

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth*0.4,window.innerHeight*0.8);
document.getElementById("robotCanvas").appendChild(renderer.domElement);

const body=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x00aaff})
);
scene.add(body);

const head=new THREE.Mesh(
new THREE.BoxGeometry(0.8,0.8,0.8),
new THREE.MeshStandardMaterial({color:0x007bff})
);
head.position.y=1.5;
scene.add(head);

const light=new THREE.PointLight(0xffffff,2);
light.position.set(5,5,5);
scene.add(light);

camera.position.z=5;

function animate(){
requestAnimationFrame(animate);
head.rotation.y+=0.01;
renderer.render(scene,camera);
}
animate();

function robotSpeak(){
const speech=new SpeechSynthesisUtterance();
speech.text="Welcome. Please fill your details to start the interview.";
window.speechSynthesis.speak(speech);
}
document.body.addEventListener("click",robotSpeak,{once:true});

</script>

</body>
</html>
