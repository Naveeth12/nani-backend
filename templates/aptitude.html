<!DOCTYPE html>
<html>
<head>
<title>Level 1 - Aptitude Test</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow-x:hidden;
}

/* MAIN LAYOUT */

.container{
display:flex;
gap:40px;
padding:40px;
align-items:flex-start;
}

/* ROBOT PANEL */

.robot-panel{
flex:1;
position:sticky;
top:40px;
height:85vh;

border-radius:30px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);

box-shadow:
0 0 40px rgba(0,255,255,0.4),
inset 0 0 20px rgba(255,255,255,0.2);

display:flex;
align-items:center;
justify-content:center;
}

/* ROBOT FLOAT ANIMATION */

.robot-panel img{
width:70%;
animation:floatRobot 4s ease-in-out infinite;
}

@keyframes floatRobot{
0%{transform:translateY(0px)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0px)}
}

/* TEST PANEL */

.test-panel{
flex:1.4;
}

/* TITLE */

h1{
text-align:center;
margin-bottom:15px;
}

/* TIMER */

.timer{
text-align:center;
font-size:22px;
color:#00ffff;
margin-bottom:20px;
}

/* BUTTON */

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#00ffff;
font-weight:bold;
cursor:pointer;
margin-bottom:20px;

box-shadow:0 0 15px rgba(0,255,255,0.6);
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

/* QUESTION CARD */

.question{

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

border-radius:20px;

padding:20px;

margin-bottom:20px;

box-shadow:
0 10px 25px rgba(0,0,0,0.3),
inset 0 0 10px rgba(255,255,255,0.2);

}

/* OPTIONS */

.options label{
display:block;
margin-top:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<!-- ROBOT PANEL -->

<div class="robot-panel">
<img src="/static/robot.png">
</div>


<!-- TEST PANEL -->

<div class="test-panel">

<h1>Level 1 - Aptitude Test (50 Questions)</h1>

<div class="timer" id="timer">
Time Remaining: 60:00
</div>

<button onclick="startTest()">Start Test</button>

<div id="questions"></div>

<button onclick="submitTest()">Submit Test</button>

</div>

</div>


<script>

/* TIMER */

let time = 3600

function startTest(){

setInterval(function(){

let m = Math.floor(time/60)
let s = time%60

if(s < 10){
s = "0"+s
}

document.getElementById("timer").innerHTML =
"Time Remaining: "+m+":"+s

time--

},1000)

loadQuestions()

}


/* 50 QUESTIONS */

const questions = [

{q:"10 + 5 ?",a:["10","15","20","25"],c:"15"},
{q:"20 / 4 ?",a:["2","4","5","10"],c:"5"},
{q:"9 * 3 ?",a:["18","21","27","30"],c:"27"},
{q:"12 + 8 ?",a:["18","20","21","22"],c:"20"},
{q:"30 / 5 ?",a:["3","4","6","7"],c:"6"},
{q:"7 * 6 ?",a:["36","40","42","48"],c:"42"},
{q:"15 + 10 ?",a:["20","25","30","35"],c:"25"},
{q:"50 / 10 ?",a:["2","5","8","10"],c:"5"},
{q:"8 * 8 ?",a:["56","60","64","70"],c:"64"},
{q:"18 + 12 ?",a:["28","30","32","36"],c:"30"},

{q:"100 / 20 ?",a:["3","4","5","6"],c:"5"},
{q:"6 * 7 ?",a:["36","40","42","48"],c:"42"},
{q:"9 + 11 ?",a:["18","20","21","22"],c:"20"},
{q:"16 / 4 ?",a:["2","3","4","5"],c:"4"},
{q:"13 + 7 ?",a:["18","19","20","21"],c:"20"},
{q:"14 * 2 ?",a:["24","26","28","30"],c:"28"},
{q:"40 / 8 ?",a:["4","5","6","7"],c:"5"},
{q:"11 + 9 ?",a:["18","19","20","21"],c:"20"},
{q:"12 * 2 ?",a:["20","22","24","26"],c:"24"},
{q:"25 / 5 ?",a:["3","4","5","6"],c:"5"},

{q:"7 + 13 ?",a:["18","19","20","21"],c:"20"},
{q:"3 * 9 ?",a:["24","25","27","30"],c:"27"},
{q:"36 / 6 ?",a:["4","5","6","7"],c:"6"},
{q:"5 + 15 ?",a:["18","19","20","21"],c:"20"},
{q:"4 * 8 ?",a:["28","30","32","36"],c:"32"},
{q:"45 / 9 ?",a:["4","5","6","7"],c:"5"},
{q:"6 + 14 ?",a:["18","19","20","21"],c:"20"},
{q:"9 * 4 ?",a:["32","34","36","38"],c:"36"},
{q:"81 / 9 ?",a:["7","8","9","10"],c:"9"},
{q:"10 + 10 ?",a:["18","19","20","21"],c:"20"},

{q:"6 * 6 ?",a:["30","32","36","40"],c:"36"},
{q:"60 / 12 ?",a:["4","5","6","7"],c:"5"},
{q:"8 + 12 ?",a:["18","19","20","21"],c:"20"},
{q:"7 * 5 ?",a:["30","35","40","45"],c:"35"},
{q:"49 / 7 ?",a:["5","6","7","8"],c:"7"},
{q:"14 + 6 ?",a:["18","19","20","21"],c:"20"},
{q:"9 * 5 ?",a:["40","45","50","55"],c:"45"},
{q:"64 / 8 ?",a:["6","7","8","9"],c:"8"},
{q:"11 + 11 ?",a:["20","21","22","23"],c:"22"},
{q:"3 * 8 ?",a:["20","22","24","26"],c:"24"},

{q:"72 / 9 ?",a:["6","7","8","9"],c:"8"},
{q:"5 + 17 ?",a:["20","21","22","23"],c:"22"},
{q:"6 * 8 ?",a:["40","42","48","50"],c:"48"},
{q:"54 / 6 ?",a:["7","8","9","10"],c:"9"},
{q:"13 + 9 ?",a:["20","21","22","23"],c:"22"},
{q:"7 * 7 ?",a:["45","48","49","50"],c:"49"},
{q:"90 / 10 ?",a:["7","8","9","10"],c:"9"},
{q:"15 + 5 ?",a:["18","19","20","21"],c:"20"},
{q:"4 * 9 ?",a:["32","34","36","38"],c:"36"},
{q:"100 / 25 ?",a:["2","3","4","5"],c:"4"}

]


function loadQuestions(){

let container = document.getElementById("questions")

questions.forEach((q,i)=>{

let html = `<div class="question">
<b>Q${i+1}: ${q.q}</b>
<div class="options">`

q.a.forEach(opt=>{

html += `
<label>
<input type="radio" name="q${i}" value="${opt}">
${opt}
</label>
`

})

html += "</div></div>"

container.innerHTML += html

})

}


/* SUBMIT */

async function submitTest(){

let answers = {}

questions.forEach((q,i)=>{

let ans = document.querySelector(`input[name="q${i}"]:checked`)

if(ans){
answers[i+1] = ans.value
}

})

let response = await fetch("/submit_aptitude",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({answers:answers})
})

let html = await response.text()

document.body.innerHTML = html

}

</script>


<!-- CAMERA + ANTI CHEATING (ADDED CODE) -->

<video id="camera"
autoplay
muted
style="position:fixed;bottom:10px;right:10px;width:200px;border:3px solid red;border-radius:10px">
</video>

<script src="/static/proctor.js"></script>

<script>

async function startCamera(){

try{

const stream = await navigator.mediaDevices.getUserMedia({video:true});

localStorage.setItem("cameraAllowed","true");

const video=document.getElementById("camera");

video.srcObject=stream;

window.examStream = stream;

}
catch(err){

alert("Camera permission is required to attend the interview.");

window.location="/";

}

}

startCamera();

</script>

</body>
</html>
